<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
        width:100px;
        height:100px;
        border: 1px solid black;
        }
        .back-red{
        background-color: red;
        }
        .back-blue{
        background-color: blue;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <button onclick="changeColor()">배경색 바꾸기</button>


    <script>

        function changeColor(){
            let num = prompt("1 또는 2를 입력하세요. 1.빨간색, 2.파란색");
            
            let config = document.getElementsByClassName('box')[0];

            if(num ==1 ){
                // config.classList.remove('back-blue');
                // config.classList.add('back-red');
                config.setAttribute('class', 'box back-red');
            } else if(num == 2){
                //  config.classList.remove('back-red');
                // config.classList.add('back-blue');
                config.setAttribute('class', 'box back-blue');
            } else{
                alert("잘못 입력했습니다...");
            }
            console.log(document.getElementsByClassName('box')[0].classList);
        }
           

    </script>
</body>
</html>
