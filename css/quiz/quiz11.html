<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            
            width: 800px;
        }
        .section{
            width: 800px;
            height: 100px;
            
            display: flex;
            justify-content: left;
        }
        .box{
            border: 1px solid black;
        }
        .yellow-box{
            background-color: yellow;
        }
        
        .gray-box{
            background-color: gray;
        }
        .purple-box{
            background-color: purple;
        }
        .skyblue-box{
            background-color: skyblue;
        }
        .orange-box{
            background-color: orange;
        }
        .green-box{
            background-color: green;
        }
        .pink-box{
            background-color: pink;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <div class="box yellow-box" style="width: 50%;"></div>
            <div class="box gray-box" style="width: 50%;"></div>
        </div>

        <div class="section">
            <div class="box purple-box" style="width: 100%;"></div>
        </div>


        <div class="section" style="height: 200px;">
            <div class="box skyblue-box" style="width: 34%;"></div>

            <div style="width: 66%;">
                <div class="box yellow-box" style="height: 50%;" ></div>
                <div class="box orange-box" style="height: 50%;" ></div>
            </div>

        </div>

        <div class="section">
            <div class="box yellow-box" style="width: 25%;"></div>
            <div class="box orange-box" style="width: 25%;"></div>
            <div class="box yellow-box" style="width: 25%;"></div>
            <div class="box green-box" style="width: 25%;"></div>
        </div>
    </div>
</body>
</html>
