<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            margin: 0 auto;
            width: 700px;
            height: 500px;
            border: 1px solid black;

        }
        .section{
            display: flex;
            justify-content: space-between;
        }

        .nav{
            background-color: red;
            height: 100px;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main{
            background-color: orange;
            height: 300px;
            width: 490px;

            flex-wrap: wrap;

            display: flex;
            justify-content: space-evenly;
            align-content: space-evenly;

            gap:10px;
        }
        .aside{
            background-color: green;
            height: 300px;
            width: 210px;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .black-box{
            background-color: black;
            width: 100px;
            height: 50px;

            margin: 10px;

            transition-duration: 1s;
        }
        .black-box:hover{

            transition-duration: 1s;
            transform: scale(1.3);
        }
        .footer{
            background-color: blue;
            color: white;
            
            width: 700px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <div class="nav" style="width: 200px;">메인메뉴</div>
            <div class="nav" style="width: 100px;">마이페이지</div>
        </div>
    
        <div class="section">
            <div class="main">
                <div class="black-box"></div>
                <div class="black-box"></div>
                <div class="black-box"></div>
                <div class="black-box"></div>
                <div class="black-box"></div>
                <div class="black-box"></div>
            </div>
            <div class="aside">aside</div>            
        </div>

        <div class="section">
            <div class="footer">footer</div>
        </div>

    </div>
</body>
</html>
