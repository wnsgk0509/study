<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        /* 
            display 속성
                none            :표시x
                block           :한줄 다 차지, 사이즈*width, height)적용 가능, 여백 적용
                inline          :컨텐츠 크기만큼만 차지 (사이즈 적용 x), 나란히 배치, 여백 적용(좌/우)
                inline-block    : 자체적으로 block 처럼 작동 (사이즈, 여백)
                                  외부적으로는 inline 처럼 적용 (다른 요소와 상호작용 -> 나란히 배치)
                
        */


        .box1{
            /* div 태그 기본 성격 block */
            
            width: 200px;
            height: 100px;
            border: 1px solid black;

            margin: 10px;
            padding: 10px;

            /* display: block inline inline-block none; */
            display: inline;
        }

        .box2{
            /* div 태그 기본 성격 block */
            
            width: 200px;
            height: 100px;
            border: 1px solid black;

            
            margin: 10px;
            padding: 10px;

            display: block;
        }

        .box3{
            /* div 태그 기본 성격 block */
            
            width: 200px;
            height: 100px;
            border: 1px solid black;

            
            margin: 10px;
            padding: 10px;

            /* display: inline; */
            display: inline-block;
        }

        .span1{
            /* display: block; */
            display: inline;

            width: 200px;
            height: 100px;

        }

        .parent{
            width: 200px;
            height: 100px;
            border: 1px solid blue;
        }

        .child{
            width: 100px;
            height: 50px;
            border: 1px solid red;

            display: none;
        }

        .parent:hover .child{
            display: block;
        }

        .parent:hover .parent-span{
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>

    <span class="span1">span1</span>
    <span>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolorum deleniti nam et illum repudiandae, minus eaque quisquam exercitationem, consequatur magnam, eos accusamus asperiores? Optio nihil, aliquid accusantium fuga ratione corporis.</span>


    <div class="parent">
        <span class="parent-span">부모</span>
        <br>

        <div class="child">
            자식
        </div>
        
    </div>
</body>
</html>
