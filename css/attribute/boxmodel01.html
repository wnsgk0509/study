<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;   
        }

        .box1{
            margin: 30px;
            border: 2px solid blue;
            padding: 15px;
        }

        .box2{

            margin: 50px;

            padding-left: 30px;
            padding-top: 2rem;
            /* border: 2px solid red; */

            border-width: 2px;
            border-style: dashed;
            border-color: red;

            width: 200px;
            height: 150px;
        }

    </style>
</head>

<body>
    <div class="box1">
        box1
    </div>

    <div class="box2">
        box2
    </div>

    <p>다른 요소 p태그</p>
</body>
</html>
