<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 내부 스타일 시트 방식 -->
    <style>
        /* head 태그 내부, style 태그 내부 */
        /* css 코드 작성 영역 */
        
        h1{color: gray;}

        h3{color: blue}
    </style>

    <!-- 외부 스타일 시트 방식
        외부 css 파일 연결 -->
    <link rel="stylesheet" href="basic.css">

</head>
<body>

    <!-- 인라인 스타일 방식 -->
    <h1>CSS Basic</h1>

    <!-- 인라인 스타일 방식 >>> 내부 스타일 시트 방식 -->
    <h1 style="color: red;">CSS Basic</h1>
    <h1>CSS Basic</h1>

    <h2 style="color: aquamarine;">CSS h2 tag</h2>

    <!-- 내부 스타일 시트 vs 외부 스타일 시트 -->
    <!-- 마지막에 적용된 수타을 , 적용 순서 기준  -->
    <h3>CSS h3 tag</h3>

    
    <!-- 외부 스타일 시트 방식 -->
    <h4>CSS h4 tag</h4>
</body>
</html>
